<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Trattoria Moderna | Sabor Auténtico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    
    <style>
        :root {
            --dorado: #c5a059;
            --oscuro: #1a1a1a;
            --claro: #f4f4f4;
            --verde: #2d5a27;
            /* Variables de n8n */
            --n8n-chat-primary-color: var(--verde);
            --n8n-chat-button-color: var(--dorado);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.6; background-color: var(--claro); }
        
        /* Contenedor del chat */
        #n8n-chat { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }

        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=1350&q=80');
            background-size: cover; background-position: center; height: 60vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
        }
        
        nav { background: var(--oscuro); padding: 1rem; position: sticky; top: 0; z-index: 999; }
        nav ul { display: flex; justify-content: center; list-style: none; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; text-transform: uppercase; }

        .container { max-width: 1100px; margin: 2rem auto; padding: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .menu-item { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .menu-info { padding: 20px; }
        
        footer { background: var(--oscuro); color: white; text-align: center; padding: 2rem; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>La Trattoria Moderna</h1>
        <p>Experiencia culinaria de la granja a tu mesa</p>
    </header>

    <nav>
        <ul>
            <li><a href="#">Menú</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 style="text-align:center; margin-bottom:30px;">Nuestro Menú</h2>
        <div class="menu-grid">
            <div class="menu-item">
                <div class="menu-info"><h3>Bruschetta de Tomate</h3><p>Pan artesanal con tomates frescos.</p></div>
            </div>
            <div class="menu-item">
                <div class="menu-info"><h3>Pasta al Pesto</h3><p>Fettuccine hecho a mano.</p></div>
            </div>
        </div>
    </div>

    <div id="n8n-chat"></div>

    <footer>
        <p>&copy; 2026 La Trattoria Moderna</p>
    </footer>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
        createChat({
            webhookUrl: 'REEMPLAZA_ESTO_CON_TU_URL_DE_N8N', 
            webhookConfig: {
                method: 'POST',
                headers: {}
            },
            target: '#n8n-chat',
            mode: 'window',
            chatInputKey: 'chatInput',
            chatSessionKey: 'sessionId',
            loadPreviousSession: true,
            metadata: {},
            showWelcomeScreen: false,
            defaultLanguage: 'es',
            initialMessages: [
                '¡Hola! 👋',
                'Me llamo Nathan. ¿En qué puedo ayudarte hoy?'
            ],
            i18n: {
                es: {
                    title: '¡Hola! 👋',
                    subtitle: "Inicia un chat. Estamos aquí para ayudarte las 24 horas del día.",
                    footer: '',
                    getStarted: 'Nueva conversación',
                    inputPlaceholder: 'Escribe tu pregunta...',
                },
            },
            enableStreaming: false,
        });
    </script>
</body>
</html>
